<!DOCTYPE html>
<html>
    <head>
        <title>System Monitor</title>
    </head>
    <body>
        <h1>Live System Stats</h1>
        <div id="display">Waiting for data...</div>

        <script>
            // Connect to the WebSocket we built in FastAPI
            const ws = new WebSocket("ws://localhost:8000/ws");

            ws.onmessage = function(event) {
                // Parse the JSON data sent by Python
                const data = JSON.parse(event.data);
                
                // Update the screen
                const display = document.getElementById('display');
                display.innerHTML = `
                    <p><strong>CPU Usage:</strong> ${data.cpu}%</p>
                    <p><strong>RAM Usage:</strong> ${data.ram}%</p>
                `;
            };
        </script>
    </body>
</html>
